- type: group
  title: Bigger Bookmarks — Layout & Arrow
  widgets:
    # Global arrow visible
    - type: custom-api
      title: Layout — Global Arrow
      options:
        color: 200 50 50
        hide-arrow: false
        links: &layout-test-grid
          # Global setting: arrow visible
          - title: Title Only
            url: https://example.com/title-only

          # Description and icon alignment
          - title: Title + Description
            description: "Description"
            url: https://example.com/description
            icon: ./static/02b8858d2d/app-icon.png

          # Long text and truncation
          - title: A Very Long Bookmark Title for Testing Text Truncation
            description: "A longer description for checking spacing, alignment, and overflow behavior."
            url: https://example.com/long-content
            icon: si:github

          # Explicit link-level hide
          - title: Per-Link Arrow Hidden
            description: "hide-arrow: true overrides the global false value."
            url: https://example.com/link-arrow-hidden
            icon: mdi:eye-off
            hide-arrow: true

          # Explicit link-level show
          - title: Per-Link Arrow Visible
            description: "hide-arrow: false preserves the global false value."
            url: https://example.com/link-arrow-visible
            icon: mdi:eye
            hide-arrow: false

          # Native same-tab behavior
          - title: Same Tab
            description: "Tests same-tab: true and a missing icon."
            url: https://example.com/same-tab
            same-tab: true

          # Explicit target behavior
          - title: Explicit Target
            description: "Tests target overriding the default target."
            url: https://example.com/explicit-target
            target: _self
            icon: sh:glance

      template: *bigger-bookmarks-template

    # Same links, but global arrow hidden
    - type: custom-api
      title: Layout — Global Arrow Hidden
      options:
        color: 200 50 50
        hide-arrow: true
        links: *layout-test-grid
      template: *bigger-bookmarks-template

- type: group
  title: Bigger Bookmarks — Icons
  widgets:
    # Light/default presentation of every supported icon source
    - type: custom-api
      title: Icon Libraries
      options:
        hide-arrow: true
        links: &icon-test-grid
          - title: No Icon
            description: "Verifies layout without an icon."
            url: https://example.com/no-icon

          - title: Local Image
            description: "Raw local PNG without auto-invert."
            url: https://example.com/local-image
            icon: ./static/02b8858d2d/app-icon.png

          - title: Local Image — Auto Invert
            description: "Explicit auto-invert applied to a local PNG."
            url: https://example.com/local-image-auto-invert
            icon: auto-invert ./static/02b8858d2d/app-icon.png

          - title: Simple Icons
            description: "si: uses SVG and automatically enables flat-icon."
            url: https://github.com/
            icon: si:github

          - title: Material Design Icons
            description: "mdi: uses SVG and automatically enables flat-icon."
            url: https://example.com/mdi
            icon: mdi:bookmark

          - title: Dashboard Icons — SVG
            description: "di: defaults to SVG."
            url: https://www.proxmox.com/
            icon: di:proxmox

          - title: Dashboard Icons — PNG
            description: "Explicit PNG extension."
            url: https://www.proxmox.com/
            icon: di:proxmox.png

          - title: selfh.st Icons — SVG
            description: "sh: defaults to SVG."
            url: https://github.com/glanceapp/glance
            icon: sh:glance

          - title: selfh.st Icons — PNG
            description: "Explicit PNG extension."
            url: https://github.com/glanceapp/glance
            icon: sh:glance.png

          - title: Dashboard Icon — Auto Invert
            description: "Explicit auto-invert overrides the normal colored-icon behavior."
            url: https://example.com/di-auto-invert
            icon: auto-invert di:proxmox

          - title: selfh.st Icon — Auto Invert
            description: "Explicit auto-invert applied to an sh: icon."
            url: https://example.com/sh-auto-invert
            icon: auto-invert sh:glance

      template: *bigger-bookmarks-template

    # Same icon grid with arrows enabled to verify right-side alignment
    - type: custom-api
      title: Icons + Arrow Alignment
      options:
        color: 20 50 50
        hide-arrow: false
        links: *icon-test-grid
      template: *bigger-bookmarks-template
